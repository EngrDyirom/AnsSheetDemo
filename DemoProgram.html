<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HPGE Answer Sheet System - Demo</title>

<style>

*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  margin:0;
  padding:20px;
  background:#eef2ff;
}

.container{
  max-width:1300px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1,h2{
  text-align:center;
  color:#111827;
}

.selection{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  margin-bottom:20px;
}

select,button{
  padding:12px 18px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #d1d5db;
}

button{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  cursor:pointer;
  border:none;
  transition:0.25s ease;
  font-weight:bold;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 15px rgba(37,99,235,0.3);
}

.timer-label{
  text-align:center;
  font-size:14px;
  color:#6b7280;
  margin-top:10px;
  letter-spacing:2px;
  font-weight:bold;
}

#timer{
  width:fit-content;
  margin:20px auto;
  padding:18px 40px;
  font-size:42px;
  font-weight:bold;
  letter-spacing:3px;
  color:white;
  background:linear-gradient(135deg,#2563eb,#1e40af);
  border-radius:20px;
  text-align:center;
}

.sheet{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  margin-top:20px;
}

.column{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:15px;
  padding:18px;
}

.question{
  margin-bottom:20px;
}

.question-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.question-number{
  font-weight:bold;
  color:#111827;
}

.result-badge{
  padding:5px 10px;
  border-radius:10px;
  font-size:13px;
  font-weight:bold;
  color:white;
}

.correct-badge{
  background:#16a34a;
}

.wrong-badge{
  background:#dc2626;
}

.choices{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

label{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  padding:10px;
  min-width:60px;
  min-height:60px;
  border-radius:14px;
  border:2px solid #d1d5db;
  background:white;
  cursor:pointer;
  font-size:18px;
  transition:0.2s;
}

label:hover{
  background:#dbeafe;
}

input[type="radio"]{
  transform:scale(1.3);
}

.correct-answer{
  background:#16a34a !important;
  color:white !important;
  border:2px solid #15803d !important;
}

.wrong-answer{
  background:#dc2626 !important;
  color:white !important;
  border:2px solid #991b1b !important;
}

#result{
  margin-top:30px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  color:#111827;
}

.popup-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-box{
  background:white;
  width:90%;
  max-width:500px;
  padding:35px;
  border-radius:20px;
  text-align:center;
  animation:popupFade 0.4s ease;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.popup-box h2{
  margin-top:0;
  color:#2563eb;
  font-size:30px;
}

.popup-box p{
  font-size:18px;
  color:#374151;
  line-height:1.7;
}

.popup-box button{
  margin-top:20px;
  padding:14px 25px;
  font-size:16px;
}

@keyframes popupFade{
  from{
    transform:scale(0.8);
    opacity:0;
  }

  to{
    transform:scale(1);
    opacity:1;
  }
}

@media (max-width:768px){

  .sheet{
    grid-template-columns:1fr;
  }

  label{
    min-width:70px;
    min-height:70px;
  }

  #timer{
    font-size:34px;
    padding:16px 28px;
  }
}

</style>
</head>

<body>

<div class="popup-overlay" id="watermarkPopup">

<div class="popup-box">

<h2>NOTICE</h2>

<p>
This review material and answer sheet system
was created by <strong>Engr. Dyirom</strong>.
</p>

<p>
Demo Version Only
</p>

<button onclick="closePopup()">
Continue
</button>

</div>

</div>

<div class="container">

<h1>HPGE Answer Sheet System</h1>

<div class="selection">

<select id="examSelect">

<option value="">Select Exam</option>

<option value="HPGE_MAY2019">HPGE - May 2019</option>
<option value="HPGE_NOV2019">HPGE - November 2019</option>
<option value="HPGE_NOV2021">HPGE - November 2021</option>
<option value="HPGE_MAY2022">HPGE - May 2022</option>
<option value="HPGE_NOV2022">HPGE - November 2022</option>
<option value="HPGE_APR2023">HPGE - April 2023</option>
<option value="HPGE_NOV2023">HPGE - November 2023</option>

</select>

<button onclick="loadExam()">Load Exam</button>

<button onclick="startTimer()">Start Timer</button>

</div>

<div class="timer-label">
EXAM TIMER
</div>

<div id="timer">00:00</div>

<div class="sheet" id="sheet"></div>

<div style="text-align:center; margin-top:20px;">
<button onclick="submitExam()">Submit Exam</button>
</div>

<div id="result"></div>

</div>

<script>

function closePopup(){

document.getElementById(
'watermarkPopup'
).style.display = 'none';
}

function showDemoPopup(){

alert(
"This is only a demo program, if you wish to avail the full version, message me on tg @engr_dyirom"
);

}

const exams = {

"HPGE_MAY2019":{
title:"HPGE - May 2019",
duration:240,
total:47,
answers:[
'D','B','D','B','B','A','C','C','A','C',
'B','C','B','C','B','D','C','D','A','B',
'A','D','C','B','C','B','B','B','D','C',
'A','A','D','D','A','C','A','B','D','B',
'D','C','C','A','D','A','C'
]
}

};

let currentExam = null;
let timerInterval;
let timeLeft = 0;

function loadExam(){

const selected =
document.getElementById('examSelect').value;

if(!selected){
alert('Please select an exam first.');
return;
}

if(selected !== "HPGE_MAY2019"){

showDemoPopup();

return;
}

currentExam = exams[selected];

generateSheet(currentExam.total);

timeLeft = currentExam.duration * 60;

updateTimerDisplay();

document.getElementById('result').innerHTML='';

}

function startTimer(){

if(!currentExam){
alert('Please load the May 2019 demo exam first.');
return;
}

clearInterval(timerInterval);

timerInterval =
setInterval(updateTimer,1000);
}

function updateTimerDisplay(){

const mins = Math.floor(timeLeft / 60);

const secs = timeLeft % 60;

document.getElementById('timer').innerHTML =
`${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
}

function updateTimer(){

updateTimerDisplay();

if(timeLeft <= 0){

clearInterval(timerInterval);

submitExam();
}

timeLeft--;
}

function generateSheet(total){

const sheet =
document.getElementById('sheet');

sheet.innerHTML = '';

for(let c=0;c<2;c++){

const column =
document.createElement('div');

column.className='column';

const itemsPerColumn =
Math.ceil(total/2);

let start =
c * itemsPerColumn + 1;

let end =
Math.min(start + itemsPerColumn - 1,total);

for(let i=start;i<=end;i++){

const q =
document.createElement('div');

q.className='question';

q.innerHTML=`

<div class="question-header">

<div class="question-number">
${i}.
</div>

<div id="status${i}"></div>

</div>

<div class="choices">

<label>
<input type="radio" name="q${i}" value="A">
A
</label>

<label>
<input type="radio" name="q${i}" value="B">
B
</label>

<label>
<input type="radio" name="q${i}" value="C">
C
</label>

<label>
<input type="radio" name="q${i}" value="D">
D
</label>

<label>
<input type="radio" name="q${i}" value="E">
E
</label>

</div>
`;

column.appendChild(q);
}

sheet.appendChild(column);
}
}

function submitExam(){

if(!currentExam){
alert('Please load the May 2019 demo exam first.');
return;
}

clearInterval(timerInterval);

let score = 0;

for(let i=1;i<=currentExam.total;i++){

const selected =
document.querySelector(
`input[name="q${i}"]:checked`
);

const correctAnswer =
currentExam.answers[i - 1];

const status =
document.getElementById(`status${i}`);

document
.querySelectorAll(`input[name="q${i}"]`)
.forEach(input=>{

const label =
input.parentElement;

label.classList.remove(
'correct-answer',
'wrong-answer'
);

if(input.value === correctAnswer){

label.classList.add('correct-answer');
}
});

if(selected){

if(selected.value === correctAnswer){

score++;

status.innerHTML = `
<span class="
result-badge
correct-badge
">
CORRECT
</span>
`;

}
else{

selected.parentElement.classList.add(
'wrong-answer'
);

status.innerHTML = `
<span class="
result-badge
wrong-badge
">
WRONG
</span>
`;
}
}
else{

status.innerHTML = `
<span class="
result-badge
wrong-badge
">
NO ANSWER
</span>
`;
}
}

const percentage =
((score/currentExam.total)*100).toFixed(1);

const remarks =
percentage >= 70
? "PASSED"
: "FAILED";

document.getElementById('result').innerHTML =
`
Score: ${score} / ${currentExam.total}<br>
Percentage: ${percentage}%<br>
Remarks: ${remarks}
`;
}

</script>

</body>
</html>
